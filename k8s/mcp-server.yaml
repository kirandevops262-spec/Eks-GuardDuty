# k8s/mcp-server.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server
  namespace: mcp-system
  annotations:
    # Set this to the IRSA role ARN output from Terraform
    eks.amazonaws.com/role-arn: "${MCP_IRSA_ROLE_ARN}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: mcp-system
  labels:
    app: mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
      annotations:
        eks.amazonaws.com/role-arn: "${MCP_IRSA_ROLE_ARN}"
    spec:
      serviceAccountName: mcp-server
      containers:
        - name: mcp-server
          image: "${ECR_REPO_URI}:latest"
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['eks.amazonaws.com/role-arn']
          envFrom:
            - configMapRef:
                name: mcp-server-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: mcp-system
spec:
  selector:
    app: mcp-server
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  namespace: mcp-system
data:
  AWS_REGION: "us-east-1"
  MCP_LOG_LEVEL: "INFO"
